version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: sql-optimizer-agent-db
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all

    env_file:
      - .env

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-testdb}

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./seed_data.sql:/docker-entrypoint-initdb.d/02-seed-data.sql:ro
      - ./enable_pg_stat_statements.sql:/docker-entrypoint-initdb.d/03-enable-pg-stat-statements.sql:ro
      
    restart: always